<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inclined Plane Simulation</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
  <div id="canvases">
    <canvas id="main"></canvas>

    <div id="graphs">
      <canvas id="position-graph"></canvas>
      <canvas id="velocity-graph"></canvas>
      <canvas id="acceleration-graph"></canvas>
    </div>
  </div>

  <div id="settings">
    <span class="error"></span>

    <div class="setting">
      <input type="checkbox" id="dark-mode">
      <label for="dark-mode">Dark Mode</label>
    </div>

    <div class="setting">
      <input type="checkbox" id="display-vectors" checked="true">
      <label for="display-vectors">Display Vectors</label>
    </div>
    <br>

    <div class="setting">
      <label for="angle">Angle [°]:</label>
      <input type="text" value="30" size="5" id="angle">
    </div>

    <div class="setting">
      <label for="height">Height [m]:</label>
      <input type="text" value="3" size="5" id="height">
    </div>

    <div class="setting">
      <label for="initial-velocity">Initial Velocity [m/s]:</label>
      <input type="text" value="0" size="5" id="initial-velocity">
    </div>

    <div class="setting">
      <label for="size">Block Size [m]:</label>
      <input type="text" value="0.5" size="5" id="size">
    </div>

    <div class="setting">
      <label for="gravity">Gravity [m/s^2]:</label>
      <input type="text" value="9.81" size="5" id="gravity">
    </div>

    <div class="setting">
      <label for="energy">Energy Retained [%]:</label>
      <input type="text" value="100" size="5" id="energy">
    </div>

    <div class="setting">
      <label for="friction">Friction Coefficient:</label>
      <input type="text" value="0.5" size="5" id="friction">
    </div>

    <div class="setting">
      <label for="time-speed">Time Speed [s/s]:</label>
      <input type="text" value="1" size="5" id="time-speed">
    </div>

    <div class="setting">
      <label for="scale">Scale [px/m]:</label>
      <input type="text" value="150" size="5" id="scale">
    </div>

    <div class="player">
      <i class="fa fa-play" id="play"></i>
      <i class="fa fa-stop" id="stop"></i>
    </div>
  </div>

  <div id="modal-overlay"></div>
  <div id="modal">
    <canvas id="graph"></canvas>
  </div>

  <script src="src/index.js" type="module"></script>
</body>
</html>
